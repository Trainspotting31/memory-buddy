<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Memory Starter Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; color: white; margin-bottom: 30px; }
    .header h1 { font-size: 2rem; margin-bottom: 10px; }
    .header p { opacity: 0.9; }
    .chat-box { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .messages { height: 400px; overflow-y: auto; padding: 20px; background: #f8fafc; }
    .message { margin-bottom: 16px; padding: 12px 16px; border-radius: 12px; max-width: 85%; }
    .message.user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-left: auto; }
    .message.assistant { background: white; color: #1e293b; border: 1px solid #e2e8f0; margin-right: auto; }
    .message.system { background: #fef3c7; color: #92400e; font-size: 0.85rem; text-align: center; max-width: 100%; }
    .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: #667eea; }
    .input-area button { padding: 14px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
    .input-area button:hover { transform: translateY(-2px); }
    .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }
    .userId-input { display: flex; gap: 10px; margin-bottom: 20px; }
    .userId-input input { flex: 1; padding: 10px 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.2); color: white; font-size: 0.9rem; outline: none; }
    .userId-input input::placeholder { color: rgba(255,255,255,0.7); }
    .userId-input button { padding: 10px 16px; background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-indicator span { width: 6px; height: 6px; background: #cbd5e1; border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Agent Memory Starter</h1>
      <p>AI Agent with persistent long-term memory - built on Cloudflare Free Tier</p>
    </div>
    
    <div class="userId-input">
      <input type="text" id="userIdInput" placeholder="Enter your user ID (e.g., user123)" value="demo-user">
      <button onclick="clearMemory()">Clear Memory</button>
    </div>

    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="message system">Welcome! I remember things you tell me. Try telling me your name or a preference, then refresh and ask me to recall it!</div>
      </div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages')
    const messageInput = document.getElementById('messageInput')
    const sendBtn = document.getElementById('sendBtn')
    const userIdInput = document.getElementById('userIdInput')

    function getUserId() {
      return userIdInput.value.trim() || 'demo-user'
    }

    async function sendMessage() {
      const message = messageInput.value.trim()
      if (!message) return

      const userId = getUserId()
      
      addMessage('user', message)
      messageInput.value = ''
      sendBtn.disabled = true

      const typingIndicator = document.createElement('div')
      typingIndicator.className = 'message assistant typing-indicator'
      typingIndicator.innerHTML = '<span></span><span></span><span></span>'
      messagesDiv.appendChild(typingIndicator)
      scrollToBottom()

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, message })
        })

        messagesDiv.removeChild(typingIndicator)
        
        const reader = response.body.getReader()
        const decoder = new TextDecoder()
        let assistantMessage = ''
        let messageElement = null

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          const chunk = decoder.decode(value)
          assistantMessage += chunk

          if (!messageElement) {
            messageElement = document.createElement('div')
            messageElement.className = 'message assistant'
            messagesDiv.appendChild(messageElement)
          }
          messageElement.textContent = assistantMessage
          scrollToBottom()
        }
      } catch (error) {
        messagesDiv.removeChild(typingIndicator)
        addMessage('system', 'Error: ' + error.message)
      } finally {
        sendBtn.disabled = false
      }
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage()
      }
    }

    function addMessage(role, content) {
      const messageElement = document.createElement('div')
      messageElement.className = `message ${role}`
      messageElement.textContent = content
      messagesDiv.appendChild(messageElement)
      scrollToBottom()
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight
    }

    async function clearMemory() {
      const userId = getUserId()
      try {
        await fetch(`/memory/${userId}`, { method: 'DELETE' })
        messagesDiv.innerHTML = '<div class="message system">Memory cleared! Start fresh.</div>'
      } catch (error) {
        addMessage('system', 'Error clearing memory: ' + error.message)
      }
    }
  </script>
</body>
</html>
